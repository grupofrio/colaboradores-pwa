<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 500" role="img" aria-label="Grupo Frío">
  <title>Grupo Frío</title>
  <rect width="560" height="500" fill="#ffffff"/>
  <g transform="translate(25,20)">
    <!-- Isotipo (cubo) en negro sólido para impresión térmica.
         Las líneas blancas dan la forma facetada. -->
    <polygon points="290,0 400,64 400,190 290,126" fill="#000000"/>
    <polygon points="290,0 180,64 180,190 290,126" fill="#000000"/>
    <polygon points="430,78 510,125 510,255 430,208" fill="#000000"/>
    <polygon points="150,78 70,125 70,255 150,208" fill="#000000"/>
    <polygon points="290,132 400,196 400,332 290,268" fill="#000000"/>
    <polygon points="290,132 180,196 180,332 290,268" fill="#000000"/>
    <polygon points="150,208 70,255 70,385 150,338" fill="#000000"/>
    <polygon points="290,268 180,332 180,463 290,399" fill="#000000"/>
    <polygon points="430,208 510,255 510,385 430,338" fill="#000000"/>
    <polygon points="290,126 372,173 290,220 208,173" fill="#000000"/>
    <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
      <line x1="290" y1="0" x2="290" y2="126" stroke-width="14"/>
      <line x1="180" y1="64" x2="180" y2="463" stroke-width="14"/>
      <line x1="400" y1="64" x2="400" y2="332" stroke-width="14"/>
      <line x1="70" y1="255" x2="180" y2="332" stroke-width="14"/>
      <line x1="400" y1="196" x2="510" y2="255" stroke-width="14"/>
      <line x1="180" y1="196" x2="70" y2="125" stroke-width="14"/>
      <line x1="400" y1="190" x2="510" y2="125" stroke-width="14"/>
      <line x1="180" y1="190" x2="290" y2="126" stroke-width="14"/>
      <line x1="290" y1="126" x2="400" y2="190" stroke-width="14"/>
      <line x1="180" y1="332" x2="70" y2="255" stroke-width="14"/>
      <line x1="180" y1="332" x2="290" y2="399" stroke-width="14"/>
      <line x1="290" y1="399" x2="400" y2="332" stroke-width="14"/>
      <line x1="400" y1="332" x2="510" y2="255" stroke-width="14"/>
    </g>
  </g>
</svg>
